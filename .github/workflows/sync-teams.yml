name: Sync Team Data

on:
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      use_nominatim:
        description: "Use Nominatim for online geocoding (slower, more accurate)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync official FTC teams
        env:
          FTC_EVENTS_USERNAME: ${{ secrets.FTC_EVENTS_USERNAME }}
          FTC_EVENTS_TOKEN: ${{ secrets.FTC_EVENTS_TOKEN }}
        run: |
          if [ -n "$FTC_EVENTS_USERNAME" ] && [ -n "$FTC_EVENTS_TOKEN" ]; then
            npm run sync:ftc || echo "Warning: FTC Events API sync failed (bad credentials?); continuing with FTCScout data only."
          else
            echo "Skipping: FTC_EVENTS_USERNAME / FTC_EVENTS_TOKEN secrets not configured."
          fi

      - name: Sync team avatars
        env:
          FTC_EVENTS_USERNAME: ${{ secrets.FTC_EVENTS_USERNAME }}
          FTC_EVENTS_TOKEN: ${{ secrets.FTC_EVENTS_TOKEN }}
        run: |
          if [ -n "$FTC_EVENTS_USERNAME" ] && [ -n "$FTC_EVENTS_TOKEN" ] && [ -f public/ftc-official-teams.json ]; then
            npm run sync:ftc-avatars || echo "Warning: Avatar sync failed; continuing without avatars."
          else
            echo "Skipping: credentials not configured or official teams cache missing."
          fi

      - name: Sync FTCScout teams
        run: npm run sync:ftcscout
        env:
          FTCSCOUT_USER_AGENT: "ftcmap/1.0 cache generator (https://github.com/bigbossg13/ftcmap)"

      - name: Geocode team locations
        run: npm run sync:geocodes
        env:
          GEOCODE_USE_NOMINATIM: ${{ github.event.inputs.use_nominatim == 'true' && 'true' || 'false' }}
          GEOCODE_EMAIL: ${{ secrets.GEOCODE_EMAIL }}
          GEOCODE_USER_AGENT: "ftcmap/1.0 geocoder (https://github.com/bigbossg13/ftcmap)"

      - name: Build map cache
        run: npm run build:map-cache

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ftc-official-teams.json public/ftcscout-teams.json public/team-geocodes.json public/map-teams.json public/avatars/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync FTCScout team data"
            git pull --rebase origin main
            git push
          fi
